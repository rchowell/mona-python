name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish mona-preview
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -m "not integration"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
